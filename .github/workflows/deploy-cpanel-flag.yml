name: Deploy cPanel Flag

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Queue cPanel deploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.CPANEL_DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.CPANEL_DEPLOY_WEBHOOK_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          test -n "$DEPLOY_WEBHOOK_URL"
          test -n "$DEPLOY_WEBHOOK_TOKEN"
          curl --fail-with-body --show-error --silent \
            --request POST "$DEPLOY_WEBHOOK_URL" \
            --header "Content-Type: application/json" \
            --header "X-Deploy-Token: $DEPLOY_WEBHOOK_TOKEN" \
            --data "{\"branch\":\"$BRANCH_NAME\",\"commit\":\"$COMMIT_SHA\"}"
